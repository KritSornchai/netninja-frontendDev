<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>HTML Forms</h1>

    <form>
        <label for="username">Enter your username</label>
        <input type="text" id="username" name="username">
        <button>Submit</button>
        <br><br>
        <label for="email">Enter your email</label>
        <input type="email" id="email" name="email">
        <br><br>
        <label for="password">Enter your password</label>
        <input type="password" id="password" name="password">
        <br><br><br>
        
        <p>Select your age:</p>
        
        <input type="radio" name="age" value="0-25" id="option-1"> <!--the value attribute will be processed in the server side later when user submits the form-->
        <label for="option-1">0-25</label> 
        <br>
        <input type="radio" name="age" value="26-50" id="option-2"> <!--the name attribute is used to group the same topic of the labels together-->
        <label for="option-2">26-50</label>
        <br>
        <input type="radio" name="age" value="51+" id="option-3">
        <label for="option-3">51+</label>
        <br><br><br>
        <form>
        <p>Please select your favorite Web language:</p>
        <input type="radio" id="html" name="fav_language" value="HTML">
        <label for="html">HTML</label><br>
        <input type="radio" id="css" name="fav_language" value="CSS">
        <label for="css">CSS</label><br>
        <input type="radio" id="javascript" name="fav_language" value="JavaScript">
        <label for="javascript">JavaScript</label>
    </form>
</body>
</html>
